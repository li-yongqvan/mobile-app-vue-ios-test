name: Build Web Assets
run-name: "Build Web Assets · ${{ github.event_name }} · ${{ github.ref_name }}"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: build-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        env:
          npm_config_registry: https://registry.npmjs.org
        run: npm ci

      - name: Build web assets
        run: npm run build:web

      - name: Build iOS web assets
        env:
          VITE_API_URL: ${{ secrets.IOS_API_BASE_URL }}
        run: npm run build:ios

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: |
            dist-web
            dist
          retention-days: 5
